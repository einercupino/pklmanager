<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tournamentTitle"></title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="top-nav"><a href="index.html">Standings</a><a class="active" href="matches.html">Matches</a><a href="info.html">Roster</a></nav>

            <div class="section-header">

            <h2>Completed</h2>
            <div id="completedMatches" class="compact-list"></div>
        </section>
        <section id="playoffsTab" class="hidden">
            <div id="playoffMatches"></div>
        </section>

    <script type="module" src="matches.js"></script>
